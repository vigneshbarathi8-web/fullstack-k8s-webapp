name: Build and Deploy to k3s

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push backend image
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:buildcache,mode=max

      # Build and push frontend image
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:buildcache,mode=max

  deploy-to-k3s:
    needs: build-and-push
    if: github.event_name == 'push'
    runs-on: [self-hosted, k3s]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create namespace
        run: |
          kubectl create namespace fullstack-app --dry-run=client -o yaml | kubectl apply -f -

      - name: Create GHCR pull secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=${{ env.REGISTRY }} \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace=fullstack-app \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply storage configuration
        run: |
          mkdir -p /mnt/data
          kubectl apply -f deployment/pv.yaml
          kubectl apply -f deployment/pvc.yaml

      - name: Apply ConfigMap and Secrets
        run: |
          kubectl apply -f deployment/configmap.yaml
          kubectl apply -f deployment/secrets.yaml

      - name: Deploy database
        run: |
          kubectl apply -f deployment/db-deployment.yaml

      - name: Deploy backend
        run: |
          # Replace image tag with current commit SHA
          sed -i "s|image:.*backend.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}|g" deployment/backend-deployment.yaml
          kubectl apply -f deployment/backend-deployment.yaml

      - name: Deploy frontend
        run: |
          # Replace image tag with current commit SHA
          sed -i "s|image:.*frontend.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}|g" deployment/frontend-deployment.yaml
          kubectl apply -f deployment/frontend-deployment.yaml

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/backend-deployment -n fullstack-app --timeout=5m
          kubectl rollout status deployment/frontend-deployment -n fullstack-app --timeout=5m
          kubectl rollout status deployment/db-deployment -n fullstack-app --timeout=5m

      - name: Get service endpoints
        run: |
          echo "=== Service Status ==="
          kubectl get services -n fullstack-app
          echo ""
          echo "=== Pod Status ==="
          kubectl get pods -n fullstack-app
